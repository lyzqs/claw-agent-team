global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:19090

  - job_name: node
    static_configs:
      - targets:
          - 127.0.0.1:9100

  - job_name: process-exporter
    static_configs:
      - targets:
          - 127.0.0.1:9256

  - job_name: agent-team-exporter
    static_configs:
      - targets:
          - 127.0.0.1:19130

  - job_name: newapi-exporter
    static_configs:
      - targets:
          - 127.0.0.1:19100

  - job_name: arena-exporter
    static_configs:
      - targets:
          - 127.0.0.1:19150

  - job_name: uptime-kuma-exporter
    static_configs:
      - targets:
          - 127.0.0.1:19120

  - job_name: openclaw-otel-bridge
    static_configs:
      - targets:
          - 127.0.0.1:19160
    static_configs:
      - targets:
          - '127.0.0.1:19111'
    scrape_interval: 60s

  - job_name: quantitativeinvest-exporter
    static_configs:
      - targets:
          - 127.0.0.1:19170
    scrape_interval: 60s
