<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent Team 控制台</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --line: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --blue: #2563eb;
      --green: #16a34a;
      --red: #dc2626;
      --yellow: #d97706;
      --purple: #7c3aed;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(180deg, #f7f9fc 0%, #f3f6fb 100%);
      color: var(--text);
    }
    .wrap {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 20px 16px 28px;
    }
    h1,h2,h3 { margin: 0; }
    .muted { color: var(--muted); }
    .topbar {
      display:flex; justify-content:space-between; align-items:flex-start; gap:20px; margin-bottom:18px;
      background: linear-gradient(180deg, #ffffff, #f9fbff); border:1px solid var(--line); border-radius: 22px; padding: 18px 20px; box-shadow: var(--shadow);
      position: sticky; top: 10px; z-index: 30; backdrop-filter: blur(10px);
    }
    .topbar-left { display:flex; flex-direction:column; gap:6px; }
    .topbar-left h1 { font-size: 30px; letter-spacing: -0.03em; }
    .toolbar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    button {
      background: var(--blue); color:white; border:0; border-radius: 12px; padding: 9px 14px; cursor:pointer; font-weight:700;
      box-shadow: 0 6px 18px rgba(37,99,235,.15); transition: transform .12s ease, filter .12s ease;
    }
    button:hover { transform: translateY(-1px); filter: brightness(.98); }
    button:disabled { opacity: .5; cursor: not-allowed; transform:none; box-shadow:none; }
    .danger { background: var(--red); box-shadow: 0 6px 18px rgba(220,38,38,.14); }
    .secondary { background: #475569; box-shadow: 0 6px 18px rgba(71,85,105,.14); }
    .success { background: var(--green); box-shadow: 0 6px 18px rgba(22,163,74,.16); }
    .chip {
      display:inline-flex; align-items:center; gap:8px; padding:7px 12px; border:1px solid var(--line); border-radius:999px; background:white; color:var(--muted);
    }
    .tag-running { color:#166534; background:#dcfce7; border-color:#bbf7d0; }
    .tag-paused { color:#991b1b; background:#fee2e2; border-color:#fecaca; }
    .summary {
      display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:14px; margin-bottom:16px;
    }
    .card {
      background: var(--panel); border:1px solid var(--line); border-radius: 20px; padding:16px; box-shadow: var(--shadow);
    }
    .k { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .v { font-size: 30px; font-weight: 800; margin-top: 8px; letter-spacing: -0.03em; }
    .card-sub { margin-top: 8px; color: var(--muted); font-size: 13px; line-height: 1.5; }
    .info-grid {
      display:grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap:14px; margin-bottom:18px;
    }
    .chips-wrap { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
    .mini-chip {
      display:inline-flex; align-items:center; padding:6px 10px; border-radius:999px; background:#f1f5f9; border:1px solid #e2e8f0; color:#334155; font-size:12px;
    }
    .detail-stack { display:flex; flex-direction:column; gap:10px; margin-top:10px; }
    .detail-item {
      background:#fff; border:1px solid var(--line); border-radius:14px; padding:10px 12px;
    }
    .detail-head { display:flex; justify-content:space-between; gap:10px; align-items:center; font-size:13px; font-weight:700; }
    .detail-sub { color:var(--muted); font-size:12px; line-height:1.55; margin-top:4px; }
    .board-header { display:flex; justify-content:space-between; align-items:center; margin-bottom: 14px; }
    .filters { display:grid; grid-template-columns: repeat(4, minmax(180px, 1fr)); gap:10px; margin-bottom: 14px; }
    .filter-group { display:flex; flex-direction:column; gap:6px; }
    .filter-group label { font-size:12px; color:var(--muted); font-weight:600; }
    .filters input, .filters select {
      background:white; color:var(--text); border:1px solid var(--line); border-radius:12px; padding:10px 12px; min-width:0;
      box-shadow: inset 0 1px 2px rgba(15,23,42,.03);
    }
    .storyboard {
      display:flex; gap:16px; overflow-x:auto; padding-bottom:10px; align-items:stretch;
    }
    .storyboard::-webkit-scrollbar { height: 10px; }
    .storyboard::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:999px; }
    .lane {
      flex: 0 0 300px;
      background: var(--panel-soft); border:1px solid var(--line); border-radius: 20px; min-height: 660px; max-height: 660px; padding: 12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.65); display:flex; flex-direction:column;
    }
    .lane-title { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom: 4px; }
    .lane-count {
      min-width: 30px; height: 30px; display:inline-flex; align-items:center; justify-content:center; padding:0 10px;
      border-radius:999px; background:#e2e8f0; color:#0f172a; font-size:12px; font-weight:700;
    }
    .lane-sub { color: var(--muted); font-size: 12px; margin-bottom: 10px; }
    .lane-controls {
      display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom: 10px;
      color: var(--muted); font-size: 12px;
    }
    .lane-body {
      overflow-y: auto; padding-right: 4px; flex: 1;
    }
    .lane-body::-webkit-scrollbar { width: 8px; }
    .lane-body::-webkit-scrollbar-thumb { background:#dbe2ea; border-radius:999px; }
    .issue-card {
      background:white; border:1px solid #dbe2ea; border-left: 6px solid var(--blue); border-radius:18px; padding:14px; margin-bottom:12px;
      box-shadow: 0 8px 22px rgba(15,23,42,.06); cursor:pointer; transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
    }
    .issue-card:hover { transform: translateY(-2px); box-shadow: 0 14px 28px rgba(15,23,42,.12); border-color:#cbd5e1; }
    .issue-card.ready { border-left-color: var(--blue); }
    .issue-card.review { border-left-color: var(--yellow); }
    .issue-card.closed { border-left-color: var(--green); }
    .issue-card.waiting_human_info,
    .issue-card.waiting_human_action,
    .issue-card.waiting_human_approval { border-left-color: var(--purple); }
    .issue-title { font-weight: 700; line-height: 1.35; margin-bottom: 8px; }
    .issue-meta { display:flex; gap:6px; flex-wrap:wrap; }
    .issue-meta span, .pill {
      display:inline-flex; align-items:center; padding:3px 8px; border-radius:999px; font-size:12px; background:#f1f5f9; border:1px solid #e2e8f0; color:#334155;
    }
    .issue-desc { font-size: 13px; color:#475569; line-height: 1.55; margin-top: 10px; }
    .issue-footer { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-top: 10px; color:#64748b; font-size:12px; }
    .lane-empty, .empty { color: var(--muted); padding: 10px 4px; }
    .explorer { margin-top: 24px; }
    .explorer-grid { display:grid; grid-template-columns: 360px 1fr; gap: 18px; }
    .issue-list-item {
      padding: 12px 14px; border: 1px solid var(--line); border-radius: 16px; margin-bottom: 10px; cursor:pointer; background:white;
      transition: box-shadow .12s ease, border-color .12s ease, transform .12s ease;
    }
    .issue-list-item.active { border-color: var(--blue); background: #f8fbff; box-shadow: 0 8px 22px rgba(37,99,235,.08); }
    .issue-list-item:hover { background:#f8fbff; transform: translateY(-1px); }
    .preview { background: white; border: 1px solid var(--line); border-radius: 18px; padding: 16px; box-shadow: inset 0 1px 0 rgba(255,255,255,.7); }
    .kv { display:grid; grid-template-columns: 150px 1fr; gap:8px; margin-top: 10px; }
    .kv div:nth-child(odd) { color: var(--muted); }
    .actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; }
    .pager { display:flex; gap:8px; align-items:center; margin-top:12px; }
    .toast {
      position: fixed; right: 20px; bottom: 20px; background: #0f172a; border: 1px solid #1f2937; color: white;
      padding: 12px 14px; border-radius: 14px; box-shadow: 0 10px 28px rgba(15,23,42,.24); display:none; z-index:9999;
    }
    .toast.show { display:block; }
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(15,23,42,.4); display:none; align-items:center; justify-content:center; padding:18px; z-index: 9998;
    }
    .modal-backdrop.show { display:flex; }
    .modal {
      width:min(980px, 100%); max-height: 92vh; overflow:auto; background:white; border:1px solid var(--line); border-radius: 24px; padding: 20px; box-shadow: 0 24px 64px rgba(15,23,42,.22);
    }
    .modal-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
    .modal-section {
      background:#f8fafc; border:1px solid var(--line); border-radius:16px; padding:14px; margin-top:14px;
    }
    .activity-feed { display:flex; flex-direction:column; gap:12px; margin-top:10px; }
    .activity-item {
      background:white; border:1px solid #e2e8f0; border-radius:16px; padding:12px 14px; box-shadow: 0 4px 14px rgba(15,23,42,.04);
    }
    .activity-top { display:flex; justify-content:space-between; gap:12px; align-items:center; margin-bottom:6px; }
    .activity-title { font-weight:700; }
    .activity-meta { display:flex; gap:6px; flex-wrap:wrap; color:#475569; font-size:12px; }
    .activity-details { color:#475569; font-size:13px; line-height:1.55; margin-top:8px; }
    .agent-block { padding: 12px; border:1px solid var(--line); border-radius: 16px; margin-bottom: 10px; background:white; }
    .agent-issues { margin: 8px 0 0 18px; }
    .agent-issues li { margin: 6px 0; }
    table { width:100%; border-collapse: collapse; margin-top: 8px; }
    th, td { text-align:left; padding:10px 8px; border-bottom:1px solid var(--line); vertical-align:top; }
    th { color:#475569; font-size:13px; }
    code { color:#7c3aed; }
    @media (max-width: 1200px) {
      .topbar { flex-direction:column; }
      .filters { grid-template-columns: 1fr; }
      .explorer-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="topbar-left">
        <h1>Agent Team 控制台</h1>
        <div class="muted">亮色主题 · Storyboard · Issue Explorer · 弹窗详情</div>
      </div>
      <div class="toolbar">
        <button id="reloadBtn">重新加载</button>
        <button id="runBtn" class="success">恢复流程</button>
        <button id="pauseBtn" class="danger">暂停流程</button>
        <span id="workflowChip" class="chip">流程状态加载中…</span>
      </div>
    </div>

    <div id="summary" class="summary"></div>

    <div class="info-grid">
      <div class="card">
        <div class="k">项目说明</div>
        <div id="projectMeta" class="card-sub"></div>
      </div>
      <div class="card">
        <div class="k">固定角色</div>
        <div id="roleMeta" class="chips-wrap"></div>
      </div>
      <div class="card">
        <div class="k">角色实例说明</div>
        <div id="instanceMeta" class="card-sub"></div>
      </div>
    </div>

    <div class="card">
      <div class="board-header">
        <div>
          <h2>故事墙</h2>
          <div class="muted">第一列是人工队列，中间按 Agent 分列，最后一列是已关闭 Issue。</div>
        </div>
      </div>
      <div class="filters">
        <div class="filter-group">
          <label for="searchInput">搜索</label>
          <input id="searchInput" placeholder="按标题搜索 Issue" />
        </div>
        <div class="filter-group">
          <label for="agentFilter">Agent</label>
          <select id="agentFilter"></select>
        </div>
        <div class="filter-group">
          <label for="statusFilter">状态</label>
          <select id="statusFilter"></select>
        </div>
        <div class="filter-group">
          <label for="sortSelect">排序</label>
          <select id="sortSelect">
            <option value="issue_no_desc">按 Issue 号倒序</option>
            <option value="issue_no_asc">按 Issue 号正序</option>
            <option value="updated_desc">按更新时间倒序</option>
          </select>
        </div>
      </div>
      <div id="storyboard" class="storyboard"></div>
    </div>

    <div class="explorer">
      <div class="card">
        <div class="board-header">
          <div>
            <h2>所有 Issue</h2>
            <div class="muted">支持按 agent、状态、关键词筛选，并分页查看。</div>
          </div>
        </div>
        <div class="explorer-grid">
          <div>
            <div id="issueList"></div>
            <div class="pager">
              <button id="prevPageBtn" class="secondary">上一页</button>
              <span id="pageInfo" class="muted"></span>
              <button id="nextPageBtn" class="secondary">下一页</button>
            </div>
          </div>
          <div id="issuePreview" class="preview"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="modalBackdrop" class="modal-backdrop">
    <div class="modal">
      <div class="modal-top">
        <div>
          <h2 id="modalTitle">Issue 详情</h2>
          <div id="modalSubtitle" class="muted"></div>
        </div>
        <button id="closeModalBtn" class="secondary">关闭</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    let issuesData = [];
    let boardData = null;
    let workflowControl = { mode: 'running' };
    let filteredIssues = [];
    let selectedIssueId = null;
    let currentPage = 1;
    const pageSize = 8;
    const lanePageSize = 4;
    const lanePages = {};
    const FLOW_ROLES = ['pm', 'dev', 'qa', 'ops', 'ceo'];
    const FLOW_AGENTS = ['agent-team-pm', 'agent-team-dev', 'agent-team-qa', 'agent-team-ops', 'agent-team-ceo'];
    const AGENT_LABELS = {
      'agent-team-pm': 'PM',
      'agent-team-dev': 'Dev',
      'agent-team-qa': 'QA',
      'agent-team-ops': 'Ops',
      'agent-team-ceo': 'CEO',
      'unassigned': '未分配',
    };
    const AGENT_STAGE_HINTS = {
      'agent-team-pm': '需求梳理',
      'agent-team-dev': '开发实现',
      'agent-team-qa': '测试验收',
      'agent-team-ops': '上线运维',
      'agent-team-ceo': '决策兜底',
      'unassigned': '待分配',
    };

    function showToast(msg, isError=false) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.style.borderColor = isError ? '#ef4444' : '#22c55e';
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2600);
    }

    function renderTable(rows, cols) {
      if (!rows || !rows.length) return '<div class="empty">当前为空</div>';
      const head = `<tr>${cols.map(c => `<th>${c[1]}</th>`).join('')}</tr>`;
      const body = rows.map(r => `<tr>${cols.map(c => `<td>${r[c[0]] ?? ''}</td>`).join('')}</tr>`).join('');
      return `<table><thead>${head}</thead><tbody>${body}</tbody></table>`;
    }

    function formatTime(ms) {
      if (!ms) return '—';
      return new Date(ms).toLocaleString('zh-CN', { hour12: false });
    }

    function isPaused() { return workflowControl?.mode === 'paused'; }

    function roleOfAgent(agentId) {
      if (!agentId) return '';
      const hit = FLOW_ROLES.find(role => agentId.endsWith(`-${role}`));
      return hit || '';
    }

    function displayAgentName(agentId) {
      return AGENT_LABELS[agentId] || agentId;
    }

    function orderedAgentIds(agentIds) {
      const set = new Set((agentIds || []).filter(Boolean));
      const ordered = [];
      for (const id of FLOW_AGENTS) {
        if (set.has(id)) {
          ordered.push(id);
          set.delete(id);
        }
      }
      return ordered.concat([...set].sort());
    }

    async function apiPost(path, payload) {
      const url = new URL(path, window.location.origin).toString();
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      return await res.json();
    }

    async function apiGet(path) {
      const url = new URL(path, window.location.origin).toString();
      const res = await fetch(url);
      return await res.json();
    }

    async function toggleWorkflow(mode) {
      const out = await apiPost('/api/workflow-control', { mode, note: `set_from_ui:${mode}` });
      if (out.ok) {
        workflowControl = out.result;
        await loadData();
      }
      return out;
    }

    async function doClose(issueId) {
      const out = await apiPost('/api/close', { issue_id: issueId, resolution: 'completed' });
      await loadData();
      return out;
    }

    async function doCancel(dispatchRef) {
      const out = await apiPost('/api/cancel', { dispatch_ref: dispatchRef, reason: 'cancelled_from_ui' });
      await loadData();
      return out;
    }

    async function doRetry(issueId, latestAttempt) {
      if (!latestAttempt?.runtime_binding_id) {
        showToast('当前 issue 没有 runtime_binding_id，无法直接 retry', true);
        return;
      }
      showToast('Retry 下一步补 payload 编辑器后即可完整重试。', false);
    }

    async function resolveHuman(issueId, resolution, note='') {
      const out = await apiPost('/api/human/resolve', { issue_id: issueId, resolution, note });
      await loadData();
      return out;
    }

    function issueAgentMap(issueId) {
      return (boardData?.agent_workload || []).find(a => a.issues.some(i => i.issue_id === issueId));
    }

    function renderSummary() {
      const employees = boardData.employee_view || [];
      const projects = boardData.project_view || [];
      const fixedRoles = FLOW_ROLES;
      const fixedAgents = orderedAgentIds((boardData.agent_workload || []).map(x => x.agent_id));
      const metrics = [
        ['项目数', projects.length],
        ['固定角色', fixedRoles.length],
        ['角色实例', employees.length],
        ['固定 Agent', fixedAgents.length],
      ];
      document.getElementById('summary').innerHTML = metrics.map(([k, v]) => `<div class="card"><div class="k">${k}</div><div class="v">${v}</div></div>`).join('');
      const chip = document.getElementById('workflowChip');
      chip.textContent = workflowControl.mode === 'paused' ? '总流程已暂停' : '总流程运行中';
      chip.className = `chip ${workflowControl.mode === 'paused' ? 'tag-paused' : 'tag-running'}`;
      document.getElementById('projectMeta').innerHTML = projects.length
        ? `<div class="detail-stack">${projects.map(p => `<div class="detail-item"><div class="detail-head"><span>${p.name}</span><span>${p.project_key}</span></div><div class="detail-sub">总 Issue ${p.total_issues}，已关闭 ${p.closed_issues}，Agent 队列 ${p.agent_queue_issues}，人工队列 ${p.human_queue_issues}</div></div>`).join('')}</div>`
        : '暂无项目';
      document.getElementById('roleMeta').innerHTML = fixedAgents.map(agentId => {
        const boundEmployees = employees.filter(e => e.agent_id === agentId);
        return `<span class="mini-chip">${displayAgentName(agentId)} · ${agentId} · ${boundEmployees.length} 个实例</span>`;
      }).join('');
      document.getElementById('instanceMeta').innerHTML = employees.length
        ? `<div class="detail-stack">${fixedAgents.map(agentId => {
            const boundEmployees = employees.filter(e => e.agent_id === agentId);
            return `<div class="detail-item"><div class="detail-head"><span>${displayAgentName(agentId)} / ${agentId}</span><span>${boundEmployees.length} 个实例</span></div><div class="detail-sub">${boundEmployees.length ? boundEmployees.map(e => `${e.employee_key}${e.project_key ? ` (${e.project_key})` : ''}`).join('、') : '暂无实例'}</div></div>`;
          }).join('')}</div>`
        : '暂无实例';
    }

    function getAllIssuesEnriched() {
      return issuesData.map(item => {
        const issue = item.issue;
        const agent = issueAgentMap(issue.id);
        return {
          ...item,
          current_agent_id: agent?.agent_id || 'unassigned',
          current_agent_role: agent?.role || roleOfAgent(agent?.agent_id || ''),
          current_agent_label: displayAgentName(agent?.agent_id || 'unassigned'),
          current_agent_session: agent?.session_key || '',
        };
      });
    }

    function getFilteredIssues() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      const agentFilter = document.getElementById('agentFilter').value;
      const statusFilter = document.getElementById('statusFilter').value;
      const sort = document.getElementById('sortSelect').value;
      let arr = getAllIssuesEnriched().filter(item => {
        const issue = item.issue;
        const desc = (issue.description_md || '').toLowerCase();
        const matchQ = !q || issue.title.toLowerCase().includes(q) || desc.includes(q);
        const matchAgent = !agentFilter || item.current_agent_id === agentFilter;
        const matchStatus = !statusFilter || issue.status === statusFilter;
        return matchQ && matchAgent && matchStatus;
      });
      if (sort === 'issue_no_desc') arr.sort((a,b) => b.issue.issue_no - a.issue.issue_no);
      if (sort === 'issue_no_asc') arr.sort((a,b) => a.issue.issue_no - b.issue.issue_no);
      if (sort === 'updated_desc') arr.sort((a,b) => (b.issue.updated_at_ms || 0) - (a.issue.updated_at_ms || 0));
      return arr;
    }

    function renderFilters() {
      const agentSel = document.getElementById('agentFilter');
      const statusSel = document.getElementById('statusFilter');
      const agents = orderedAgentIds([...new Set(getAllIssuesEnriched().map(x => x.current_agent_id))]);
      const statuses = [...new Set(issuesData.map(x => x.issue.status))].sort();
      agentSel.innerHTML = `<option value="">全部 Agent</option>` + agents.map(a => `<option value="${a}">${displayAgentName(a)} · ${a}</option>`).join('');
      statusSel.innerHTML = `<option value="">全部状态</option>` + statuses.map(s => `<option value="${s}">${s}</option>`).join('');
    }

    function issueCard(issueWrap) {
      const issue = issueWrap.issue;
      const agent = issueWrap.current_agent_id;
      const statusClass = (issue.status || '').replace(/[^a-z_]/g, '_');
      return `
        <div class="issue-card ${statusClass}" data-issue-id="${issue.id}">
          <div class="issue-title">#${issue.issue_no} ${issue.title}</div>
          <div class="issue-meta">
            <span>${issue.status}</span>
            <span>${issue.priority}</span>
            <span>${displayAgentName(agent)}</span>
          </div>
          <div class="issue-desc">${(issue.description_md || '').slice(0, 90)}</div>
          <div class="issue-footer">
            <span>${issue.active_attempt_no ? `Attempt #${issue.active_attempt_no}` : '暂无 Attempt'}</span>
            <button class="secondary issue-open-btn" data-issue-id="${issue.id}" type="button">查看详情</button>
          </div>
        </div>
      `;
    }

    function paginateLane(key, items) {
      const totalPages = Math.max(1, Math.ceil(items.length / lanePageSize));
      if (!lanePages[key] || lanePages[key] > totalPages) lanePages[key] = 1;
      const page = lanePages[key];
      const slice = items.slice((page - 1) * lanePageSize, page * lanePageSize);
      return { page, totalPages, slice };
    }

    function renderStoryboard() {
      const items = getFilteredIssues();
      const human = items.filter(x => ['waiting_human_info','waiting_human_action','waiting_human_approval'].includes(x.issue.status));
      const closed = items.filter(x => x.issue.status === 'closed');
      const activeByAgent = {};
      for (const item of items.filter(x => !['closed','waiting_human_info','waiting_human_action','waiting_human_approval'].includes(x.issue.status))) {
        const k = item.current_agent_id || 'unassigned';
        if (!activeByAgent[k]) activeByAgent[k] = [];
        activeByAgent[k].push(item);
      }
      const lanes = [];
      lanes.push({ key: 'human', title: '人工队列', subtitle: `${human.length} 个`, items: human });
      const orderedAgents = orderedAgentIds([
        ...Object.keys(activeByAgent),
        ...((boardData.agent_workload || []).map(agent => agent.agent_id)),
      ]);
      for (const agentId of orderedAgents) {
        if (agentId === 'unassigned') continue;
        lanes.push({
          key: agentId,
          title: displayAgentName(agentId),
          subtitle: `${AGENT_STAGE_HINTS[agentId] || '处理中'} · ${(activeByAgent[agentId] || []).length} 个 · ${agentId}`,
          items: activeByAgent[agentId] || [],
        });
      }
      if (activeByAgent.unassigned?.length) {
        lanes.push({ key: 'unassigned', title: displayAgentName('unassigned'), subtitle: `${AGENT_STAGE_HINTS.unassigned} · ${activeByAgent.unassigned.length} 个`, items: activeByAgent.unassigned });
      }
      lanes.push({ key: 'closed', title: '已关闭', subtitle: `${closed.length} 个`, items: closed });

      document.getElementById('storyboard').innerHTML = lanes.map(lane => {
        const p = paginateLane(lane.key, lane.items);
        return `
          <div class="lane">
            <div class="lane-title"><h3>${lane.title}</h3><span class="lane-count">${lane.items.length}</span></div>
            <div class="lane-sub">${lane.subtitle}</div>
            <div class="lane-controls">
              <button class="secondary lane-prev" data-lane="${lane.key}" ${p.page <= 1 ? 'disabled' : ''}>上一页</button>
              <span>${p.page} / ${p.totalPages}</span>
              <button class="secondary lane-next" data-lane="${lane.key}" ${p.page >= p.totalPages ? 'disabled' : ''}>下一页</button>
            </div>
            <div class="lane-body">
              ${p.slice.length ? p.slice.map(issueCard).join('') : '<div class="lane-empty">当前为空</div>'}
            </div>
          </div>
        `;
      }).join('');

      document.querySelectorAll('.issue-card').forEach(el => el.addEventListener('click', () => openIssueModal(el.dataset.issueId)));
      document.querySelectorAll('.issue-open-btn').forEach(el => el.addEventListener('click', (ev) => { ev.stopPropagation(); openIssueModal(el.dataset.issueId); }));
      document.querySelectorAll('.lane-prev').forEach(btn => btn.addEventListener('click', () => { lanePages[btn.dataset.lane] = Math.max(1, (lanePages[btn.dataset.lane] || 1) - 1); renderStoryboard(); }));
      document.querySelectorAll('.lane-next').forEach(btn => btn.addEventListener('click', () => { lanePages[btn.dataset.lane] = (lanePages[btn.dataset.lane] || 1) + 1; renderStoryboard(); }));
    }

    function renderIssueList() {
      filteredIssues = getFilteredIssues();
      const start = (currentPage - 1) * pageSize;
      const pageItems = filteredIssues.slice(start, start + pageSize);
      const root = document.getElementById('issueList');
      if (!pageItems.length) {
        root.innerHTML = '<div class="empty">暂无 issue</div>';
      } else {
        root.innerHTML = pageItems.map(item => {
          const issue = item.issue;
          const active = issue.id === selectedIssueId ? 'active' : '';
          return `
            <div class="issue-list-item ${active}" data-issue-id="${issue.id}">
              <div><strong>#${issue.issue_no}</strong> ${issue.title}</div>
              <div style="margin-top:6px;">
                <span class="pill">${issue.status}</span>
                <span class="pill">${issue.priority}</span>
                <span class="pill">${item.current_agent_label}</span>
              </div>
            </div>`;
        }).join('');
        root.querySelectorAll('.issue-list-item').forEach(el => el.addEventListener('click', () => { selectedIssueId = el.dataset.issueId; renderIssueList(); renderIssuePreview(); }));
      }
      const totalPages = Math.max(1, Math.ceil(filteredIssues.length / pageSize));
      document.getElementById('pageInfo').textContent = `第 ${currentPage} / ${totalPages} 页 · 共 ${filteredIssues.length} 条`;
      document.getElementById('prevPageBtn').disabled = currentPage <= 1;
      document.getElementById('nextPageBtn').disabled = currentPage >= totalPages;
    }

    function renderIssuePreview() {
      const wrap = getAllIssuesEnriched().find(x => x.issue.id === selectedIssueId) || filteredIssues[0];
      const root = document.getElementById('issuePreview');
      if (!wrap) {
        root.innerHTML = '<div class="empty">暂无 issue 详情</div>';
        return;
      }
      const issue = wrap.issue;
      const attempts = Array.isArray(wrap.attempts) ? wrap.attempts : [];
      const latest = attempts.length ? attempts[attempts.length - 1] : null;
      root.innerHTML = `
        <div><strong>#${issue.issue_no}</strong> ${issue.title}</div>
        <div style="margin-top:8px;"><span class="pill">${issue.status}</span><span class="pill">${issue.priority}</span><span class="pill">${wrap.current_agent_label}</span><span class="pill">${wrap.current_agent_id}</span></div>
        <div class="kv">
          <div>当前 Agent</div><div>${wrap.current_agent_label} · <code>${wrap.current_agent_id}</code></div>
          <div>当前角色</div><div>${wrap.current_agent_role || ''}</div>
          <div>Session</div><div><code>${wrap.current_agent_session || ''}</code></div>
          <div>当前 Attempt</div><div>${latest ? `#${latest.attempt_no}` : '暂无'}</div>
          <div>Blocker</div><div>${issue.blocker_summary || ''}</div>
          <div>Required Input</div><div>${issue.required_human_input || ''}</div>
          <div>Description</div><div>${issue.description_md || ''}</div>
        </div>
        <div class="actions">
          <button onclick="openIssueModal('${issue.id}')">打开弹窗详情</button>
        </div>
      `;
    }

    function modalActions(issueWrap) {
      const issue = issueWrap.issue;
      const attempts = Array.isArray(issueWrap.attempts) ? issueWrap.attempts : [];
      const latest = attempts.length ? attempts[attempts.length - 1] : null;
      const paused = isPaused();
      return `
        <div class="actions">
          <button class="secondary" ${paused ? 'disabled' : ''} onclick="window.retryIssue('${issue.id}')">重试</button>
          <button class="danger" ${paused || !latest || !latest.dispatch_ref ? 'disabled' : ''} onclick="window.cancelIssue('${latest?.dispatch_ref || ''}')">取消最新 Attempt</button>
          <button onclick="window.closeIssue('${issue.id}')">关闭 Issue</button>
        </div>
      `;
    }

    function openIssueModal(issueId) {
      const wrap = getAllIssuesEnriched().find(x => x.issue.id === issueId);
      if (!wrap) return;
      const issue = wrap.issue;
      const attempts = Array.isArray(wrap.attempts) ? wrap.attempts : [];
      const latest = attempts.length ? attempts[attempts.length - 1] : null;
      const timeline = latest ? (wrap.timelines?.[latest.id] || []) : [];
      const activities = Array.isArray(wrap.activities) ? wrap.activities : [];
      document.getElementById('modalTitle').textContent = `#${issue.issue_no} ${issue.title}`;
      document.getElementById('modalSubtitle').textContent = `${wrap.current_agent_label} · ${wrap.current_agent_id} · ${issue.status}`;
      document.getElementById('modalBody').innerHTML = `
        <div class="modal-section">
          <div class="kv">
            <div>当前 Agent</div><div>${wrap.current_agent_label} · <code>${wrap.current_agent_id}</code></div>
            <div>当前角色</div><div>${wrap.current_agent_role || ''}</div>
            <div>Session</div><div><code>${wrap.current_agent_session || ''}</code></div>
            <div>Owner</div><div><code>${issue.owner_employee_id || ''}</code></div>
            <div>Assigned</div><div><code>${issue.assigned_employee_id || ''}</code></div>
            <div>当前 Attempt</div><div>${latest ? `#${latest.attempt_no}` : '暂无'}</div>
            <div>Blocker</div><div>${issue.blocker_summary || ''}</div>
            <div>Required Input</div><div>${issue.required_human_input || ''}</div>
            <div>Description</div><div>${issue.description_md || ''}</div>
            <div>Acceptance</div><div>${issue.acceptance_criteria_md || ''}</div>
          </div>
        </div>
        ${modalActions(wrap)}
        <div class="modal-section">
          <h3>Attempt Timeline</h3>
          ${timeline.length ? renderTable(timeline, [
            ['checkpoint_no', '#'], ['kind', '类型'], ['summary', '摘要'], ['next_action', '下一步'], ['percent_complete', '进度%'],
          ]) : '<div class="empty">暂无 timeline</div>'}
        </div>
        <div class="modal-section">
          <h3>Activity Log</h3>
          ${activities.length ? `<div class="activity-feed">${activities.map(item => `
            <div class="activity-item">
              <div class="activity-top">
                <div class="activity-title">${item.summary}</div>
                <div class="muted">${formatTime(item.created_at_ms)}</div>
              </div>
              <div class="activity-meta">
                <span class="pill">${item.action_type}</span>
                <span class="pill">${item.actor_role || 'unknown role'}</span>
                <span class="pill">${item.actor_agent_id || 'unknown agent'}</span>
              </div>
              <div class="activity-details"><pre style="white-space:pre-wrap; word-break:break-word; color:#475569; background:#fff; border:1px solid var(--line); border-radius:12px; padding:10px; margin-top:10px;">${JSON.stringify(item.details || {}, null, 2)}</pre></div>
            </div>`).join('')}</div>` : '<div class="empty">当前 issue 暂无 activity 记录</div>'}
        </div>
      `;
      document.getElementById('modalBackdrop').classList.add('show');
    }

    function closeIssueModal() {
      document.getElementById('modalBackdrop').classList.remove('show');
    }

    window.closeIssue = async function(issueId) {
      if (!confirm('确认关闭这个 Issue？')) return;
      const out = await doClose(issueId);
      showToast(out.ok ? 'Issue 已关闭' : `关闭失败: ${out.error || 'unknown error'}`, !out.ok);
      closeIssueModal();
    }
    window.cancelIssue = async function(dispatchRef) {
      if (!dispatchRef) { showToast('当前没有可取消的 dispatch_ref', true); return; }
      if (!confirm('确认取消最新 Attempt？')) return;
      const out = await doCancel(dispatchRef);
      showToast(out.ok ? 'Latest attempt 已取消' : `取消失败: ${out.error || 'unknown error'}`, !out.ok);
      closeIssueModal();
    }
    window.retryIssue = async function(issueId) {
      const wrap = getAllIssuesEnriched().find(x => x.issue.id === issueId);
      const latest = wrap?.attempts?.length ? wrap.attempts[wrap.attempts.length - 1] : null;
      await doRetry(issueId, latest);
    }

    async function loadData() {
      try {
        const boardUrl = new URL(`/board/data.json?t=${Date.now()}`, window.location.origin).toString();
        const issuesUrl = new URL(`/board/issues.json?t=${Date.now()}`, window.location.origin).toString();
        const [boardRes, issuesRes, controlRes] = await Promise.all([
          fetch(boardUrl),
          fetch(issuesUrl),
          apiGet('/api/workflow-control'),
        ]);
        if (!boardRes.ok) throw new Error(`board HTTP ${boardRes.status}`);
        if (!issuesRes.ok) throw new Error(`issues HTTP ${issuesRes.status}`);
        if (!controlRes.ok) throw new Error(controlRes.error || 'workflow control load failed');
        boardData = await boardRes.json();
        issuesData = await issuesRes.json();
        workflowControl = controlRes.result;
        renderSummary();
        renderFilters();
        currentPage = 1;
        renderStoryboard();
        renderIssueList();
        renderIssuePreview();
      } catch (err) {
        const chip = document.getElementById('workflowChip');
        chip.textContent = `加载失败：${err.message}`;
        chip.className = 'chip tag-paused';
        console.error(err);
      }
    }

    document.getElementById('reloadBtn').addEventListener('click', loadData);
    document.getElementById('runBtn').addEventListener('click', async () => {
      const out = await toggleWorkflow('running');
      showToast(out.ok ? '总流程已恢复' : `恢复失败: ${out.error || 'unknown error'}`, !out.ok);
    });
    document.getElementById('pauseBtn').addEventListener('click', async () => {
      const out = await toggleWorkflow('paused');
      showToast(out.ok ? '总流程已暂停' : `暂停失败: ${out.error || 'unknown error'}`, !out.ok);
    });
    document.getElementById('closeModalBtn').addEventListener('click', closeIssueModal);
    document.getElementById('modalBackdrop').addEventListener('click', (e) => { if (e.target.id === 'modalBackdrop') closeIssueModal(); });
    document.getElementById('searchInput').addEventListener('input', () => { currentPage = 1; renderStoryboard(); renderIssueList(); renderIssuePreview(); });
    document.getElementById('agentFilter').addEventListener('change', () => { currentPage = 1; renderStoryboard(); renderIssueList(); renderIssuePreview(); });
    document.getElementById('statusFilter').addEventListener('change', () => { currentPage = 1; renderStoryboard(); renderIssueList(); renderIssuePreview(); });
    document.getElementById('sortSelect').addEventListener('change', () => { currentPage = 1; renderStoryboard(); renderIssueList(); renderIssuePreview(); });
    document.getElementById('prevPageBtn').addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderIssueList(); renderIssuePreview(); } });
    document.getElementById('nextPageBtn').addEventListener('click', () => {
      const totalPages = Math.max(1, Math.ceil(getFilteredIssues().length / pageSize));
      if (currentPage < totalPages) { currentPage++; renderIssueList(); renderIssuePreview(); }
    });
    loadData();
  </script>
</body>
</html>
