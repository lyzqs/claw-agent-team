<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent Team Board v1</title>
  <style>
    :root { color-scheme: dark; }
    body { font-family: Inter, ui-sans-serif, system-ui, sans-serif; margin: 0; background: #0b1020; color: #e8ecf3; }
    .wrap { max-width: 1500px; margin: 0 auto; padding: 24px; }
    h1,h2,h3 { margin: 0 0 12px; }
    .muted { color: #94a3b8; }
    .grid { display: grid; gap: 16px; }
    .cards { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .cols2 { grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); }
    .cols3 { grid-template-columns: 1.1fr 0.9fr 1.2fr; }
    .card { background: #121a2b; border: 1px solid #24314f; border-radius: 16px; padding: 16px; box-shadow: 0 4px 20px rgba(0,0,0,.18); }
    .k { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: .08em; }
    .v { font-size: 28px; font-weight: 700; margin-top: 8px; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid #24314f; vertical-align: top; }
    th { color: #93c5fd; font-size: 13px; }
    .empty { padding: 12px; color: #94a3b8; }
    .ok { color: #86efac; }
    .err { color: #fca5a5; }
    .toolbar { display: flex; gap: 12px; align-items: center; margin: 12px 0 20px; flex-wrap: wrap; }
    button { background: #1d4ed8; color: white; border: 0; border-radius: 10px; padding: 8px 14px; cursor: pointer; }
    button:hover { background: #2563eb; }
    .danger { background: #b91c1c; }
    .danger:hover { background: #dc2626; }
    .secondary { background: #475569; }
    .secondary:hover { background: #64748b; }
    .success { background: #15803d; }
    .success:hover { background: #16a34a; }
    .issue-item, .hq-item { padding: 10px 12px; border: 1px solid #24314f; border-radius: 12px; margin-bottom: 10px; cursor: pointer; }
    .issue-item:hover, .hq-item:hover { background: #172036; }
    .issue-item.active { border-color: #60a5fa; background: #172036; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; background: #1e293b; border: 1px solid #334155; margin-right: 6px; }
    .kv { display: grid; grid-template-columns: 140px 1fr; gap: 8px; margin-top: 8px; }
    .kv div:nth-child(odd) { color: #94a3b8; }
    code { color: #c4b5fd; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    @media (max-width: 1200px) { .cols3 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Agent Team Board v1</h1>
    <p class="muted">活数据 Board + Issue Detail + Attempt Timeline + Human Queue</p>

    <div class="toolbar">
      <button id="reloadBtn">重新加载数据</button>
      <span id="status" class="muted">正在加载…</span>
    </div>

    <div id="summary" class="grid cards"></div>

    <div class="grid cols2" style="margin-top:20px;">
      <div class="card">
        <h2>Project View</h2>
        <div id="projectView"></div>
      </div>
      <div class="card">
        <h2>Agent Queue</h2>
        <div id="agentQueue"></div>
      </div>
      <div class="card">
        <h2>Human Queue</h2>
        <div id="humanQueue"></div>
      </div>
      <div class="card">
        <h2>Employee View</h2>
        <div id="employeeView"></div>
      </div>
    </div>

    <div class="grid cols3" style="margin-top:20px;">
      <div class="card">
        <h2>Issue List</h2>
        <div id="issueList"></div>
      </div>
      <div class="card">
        <h2>Issue Detail</h2>
        <div id="issueDetail"></div>
      </div>
      <div class="card">
        <h2>Attempt Timeline</h2>
        <div id="attemptTimeline"></div>
      </div>
    </div>
  </div>

  <script>
    let issuesData = [];
    let boardData = null;
    let selectedIssueId = null;

    function renderTable(rows, cols) {
      if (!rows || !rows.length) return '<div class="empty">当前为空</div>';
      const head = `<tr>${cols.map(c => `<th>${c[1]}</th>`).join('')}</tr>`;
      const body = rows.map(r => `<tr>${cols.map(c => `<td>${r[c[0]] ?? ''}</td>`).join('')}</tr>`).join('');
      return `<table><thead>${head}</thead><tbody>${body}</tbody></table>`;
    }

    async function apiPost(path, payload) {
      const res = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      return await res.json();
    }

    async function resolveHuman(issueId, resolution, note='') {
      const out = await apiPost('/api/human/resolve', { issue_id: issueId, resolution, note });
      await loadData();
      return out;
    }

    function renderBoard(data) {
      const metrics = [
        ['项目数', data.project_view?.length || 0],
        ['Agent Queue', data.agent_queue?.length || 0],
        ['Human Queue', data.human_queue?.length || 0],
        ['员工数', data.employee_view?.length || 0],
      ];
      document.getElementById('summary').innerHTML = metrics.map(([k, v]) =>
        `<div class="card"><div class="k">${k}</div><div class="v">${v}</div></div>`
      ).join('');
      document.getElementById('projectView').innerHTML = renderTable(data.project_view, [
        ['project_key', 'Project'], ['status', 'Status'], ['total_issues', 'Total'], ['closed_issues', 'Closed'], ['agent_queue_issues', 'Agent Queue'], ['human_queue_issues', 'Human Queue'],
      ]);
      document.getElementById('agentQueue').innerHTML = renderTable(data.agent_queue, [
        ['issue_no', 'Issue'], ['title', 'Title'], ['priority', 'Priority'], ['status', 'Status'], ['active_attempt_no', 'Attempt'],
      ]);
      renderHumanQueue(data.human_queue || []);
      document.getElementById('employeeView').innerHTML = renderTable(data.employee_view, [
        ['employee_key', 'Employee'], ['role', 'Role'], ['status', 'Status'], ['session_key', 'Session Key'],
      ]);
    }

    function renderHumanQueue(items) {
      const root = document.getElementById('humanQueue');
      if (!items.length) {
        root.innerHTML = '<div class="empty">当前为空</div>';
        return;
      }
      root.innerHTML = items.map(item => `
        <div class="hq-item">
          <div><strong>#${item.issue_no}</strong> ${item.title}</div>
          <div style="margin-top:6px;">
            <span class="pill">${item.status}</span>
          </div>
          <div class="muted" style="margin-top:8px;">${item.blocker_summary || ''}</div>
          <div class="actions">
            <button class="success" data-action="approve" data-issue-id="${item.id}">Approve</button>
            <button class="danger" data-action="reject" data-issue-id="${item.id}">Reject</button>
            <button class="secondary" data-action="needs_info" data-issue-id="${item.id}">Needs Info</button>
          </div>
        </div>
      `).join('');
      root.querySelectorAll('button[data-action]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const issueId = btn.dataset.issueId;
          const action = btn.dataset.action;
          const out = await resolveHuman(issueId, action, `resolved_from_ui:${action}`);
          alert(out.ok ? `Human queue 已处理：${action}` : `处理失败: ${out.error || 'unknown error'}`);
        });
      });
    }

    function renderIssueList() {
      const root = document.getElementById('issueList');
      if (!issuesData.length) {
        root.innerHTML = '<div class="empty">暂无 issue</div>';
        return;
      }
      root.innerHTML = issuesData.map(item => {
        const issue = item.issue;
        const active = issue.id === selectedIssueId ? 'active' : '';
        return `
          <div class="issue-item ${active}" data-issue-id="${issue.id}">
            <div><strong>#${issue.issue_no}</strong> ${issue.title}</div>
            <div style="margin-top:6px;">
              <span class="pill">${issue.status}</span>
              <span class="pill">${issue.priority}</span>
            </div>
          </div>`;
      }).join('');
      root.querySelectorAll('.issue-item').forEach(el => {
        el.addEventListener('click', () => {
          selectedIssueId = el.dataset.issueId;
          renderIssueList();
          renderIssueDetail();
        });
      });
    }

    function getSelectedIssueObj() {
      return issuesData.find(x => x.issue.id === selectedIssueId) || issuesData[0];
    }

    async function doClose(issueId) {
      const out = await apiPost('/api/close', { issue_id: issueId, resolution: 'completed' });
      await loadData();
      return out;
    }

    async function doCancel(dispatchRef) {
      const out = await apiPost('/api/cancel', { dispatch_ref: dispatchRef, reason: 'cancelled_from_ui' });
      await loadData();
      return out;
    }

    async function doRetry(issueId, latestAttempt) {
      if (!latestAttempt?.runtime_binding_id) {
        alert('当前 issue 没有 runtime_binding_id，无法直接 retry');
        return;
      }
      alert('当前 UI 版本暂不支持从 attempt 自动恢复 payload。后端接口已就绪，下一步可补可视化 retry payload 编辑器。');
    }

    function renderIssueDetail() {
      const root = document.getElementById('issueDetail');
      const issueObj = getSelectedIssueObj();
      if (!issueObj) {
        root.innerHTML = '<div class="empty">暂无 issue detail</div>';
        document.getElementById('attemptTimeline').innerHTML = '<div class="empty">暂无 timeline</div>';
        return;
      }
      selectedIssueId = issueObj.issue.id;
      const issue = issueObj.issue;
      const attempts = issueObj.attempts || [];
      const latest = attempts.length ? attempts[attempts.length - 1] : null;

      root.innerHTML = `
        <div><strong>#${issue.issue_no}</strong> ${issue.title}</div>
        <div style="margin-top:8px;">
          <span class="pill">${issue.status}</span>
          <span class="pill">${issue.priority}</span>
        </div>
        <div class="kv">
          <div>Issue ID</div><div><code>${issue.id}</code></div>
          <div>Owner</div><div><code>${issue.owner_employee_id || ''}</code></div>
          <div>Assigned</div><div><code>${issue.assigned_employee_id || ''}</code></div>
          <div>Attempt No</div><div>${issue.active_attempt_no ?? ''}</div>
          <div>Blocker</div><div>${issue.blocker_summary || ''}</div>
          <div>Required Input</div><div>${issue.required_human_input || ''}</div>
          <div>Description</div><div>${issue.description_md || ''}</div>
          <div>Acceptance</div><div>${issue.acceptance_criteria_md || ''}</div>
        </div>
        <div class="actions">
          <button class="secondary" id="retryBtn">Retry</button>
          <button class="danger" id="cancelBtn">Cancel Latest Attempt</button>
          <button id="closeBtn">Close Issue</button>
        </div>
      `;

      const retryBtn = document.getElementById('retryBtn');
      const cancelBtn = document.getElementById('cancelBtn');
      const closeBtn = document.getElementById('closeBtn');
      retryBtn.onclick = async () => doRetry(issue.id, latest);
      closeBtn.onclick = async () => {
        if (!confirm(`确认关闭 issue #${issue.issue_no}？`)) return;
        const out = await doClose(issue.id);
        alert(out.ok ? 'Issue 已关闭' : `关闭失败: ${out.error || 'unknown error'}`);
      };
      cancelBtn.onclick = async () => {
        if (!latest?.dispatch_ref) {
          alert('当前没有可取消的 latest attempt dispatch_ref');
          return;
        }
        if (!confirm(`确认取消 latest attempt #${latest.attempt_no}？`)) return;
        const out = await doCancel(latest.dispatch_ref);
        alert(out.ok ? 'Latest attempt 已取消' : `取消失败: ${out.error || 'unknown error'}`);
      };

      if (!attempts.length) {
        document.getElementById('attemptTimeline').innerHTML = '<div class="empty">暂无 attempt / timeline</div>';
        cancelBtn.disabled = true;
        retryBtn.disabled = true;
        return;
      }
      const timeline = issueObj.timelines?.[latest.id] || [];
      document.getElementById('attemptTimeline').innerHTML = `
        <div><strong>Latest Attempt #${latest.attempt_no}</strong></div>
        <div class="kv">
          <div>Attempt ID</div><div><code>${latest.id}</code></div>
          <div>Status</div><div>${latest.status}</div>
          <div>Dispatch Ref</div><div><code>${latest.dispatch_ref || ''}</code></div>
          <div>Result</div><div>${latest.result_summary || latest.failure_summary || ''}</div>
        </div>
        ${timeline.length ? renderTable(timeline, [
          ['checkpoint_no', '#'], ['kind', 'Kind'], ['summary', 'Summary'], ['next_action', 'Next'], ['percent_complete', '%'],
        ]) : '<div class="empty">暂无 checkpoint timeline</div>'}
      `;
    }

    async function loadData() {
      const status = document.getElementById('status');
      status.textContent = '正在加载…';
      try {
        const [boardRes, issuesRes] = await Promise.all([
          fetch(`./data.json?t=${Date.now()}`),
          fetch(`./issues.json?t=${Date.now()}`),
        ]);
        if (!boardRes.ok) throw new Error(`board HTTP ${boardRes.status}`);
        if (!issuesRes.ok) throw new Error(`issues HTTP ${issuesRes.status}`);
        boardData = await boardRes.json();
        issuesData = await issuesRes.json();
        if (!selectedIssueId && issuesData.length) selectedIssueId = issuesData[0].issue.id;
        renderBoard(boardData);
        renderIssueList();
        renderIssueDetail();
        status.innerHTML = '<span class="ok">已加载真实数据</span>';
      } catch (err) {
        status.innerHTML = `<span class="err">加载失败：${err.message}</span>`;
      }
    }

    document.getElementById('reloadBtn').addEventListener('click', loadData);
    loadData();
  </script>
</body>
</html>
