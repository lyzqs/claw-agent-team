<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent Team Board v1</title>
  <style>
    :root { color-scheme: dark; }
    body { font-family: Inter, ui-sans-serif, system-ui, sans-serif; margin: 0; background: #0b1020; color: #e8ecf3; }
    .wrap { max-width: 1400px; margin: 0 auto; padding: 24px; }
    h1,h2 { margin: 0 0 12px; }
    .muted { color: #94a3b8; }
    .grid { display: grid; gap: 16px; }
    .cards { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .cols2 { grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); }
    .card { background: #121a2b; border: 1px solid #24314f; border-radius: 16px; padding: 16px; box-shadow: 0 4px 20px rgba(0,0,0,.18); }
    .k { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: .08em; }
    .v { font-size: 28px; font-weight: 700; margin-top: 8px; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid #24314f; vertical-align: top; }
    th { color: #93c5fd; font-size: 13px; }
    .empty { padding: 12px; color: #94a3b8; }
    .ok { color: #86efac; }
    .warn { color: #fbbf24; }
    .err { color: #fca5a5; }
    code { color: #c4b5fd; }
    .toolbar { display: flex; gap: 12px; align-items: center; margin: 12px 0 20px; flex-wrap: wrap; }
    button { background: #1d4ed8; color: white; border: 0; border-radius: 10px; padding: 8px 14px; cursor: pointer; }
    button:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Agent Team Board v1</h1>
    <p class="muted">第一版活数据载体。数据来源：<code>ui/board/data.json</code>（由 service 导出）。</p>

    <div class="toolbar">
      <button id="reloadBtn">重新加载数据</button>
      <span id="status" class="muted">正在加载…</span>
    </div>

    <div id="summary" class="grid cards"></div>

    <div class="grid cols2" style="margin-top:20px;">
      <div class="card">
        <h2>Project View</h2>
        <div id="projectView"></div>
      </div>
      <div class="card">
        <h2>Agent Queue</h2>
        <div id="agentQueue"></div>
      </div>
      <div class="card">
        <h2>Human Queue</h2>
        <div id="humanQueue"></div>
      </div>
      <div class="card">
        <h2>Employee View</h2>
        <div id="employeeView"></div>
      </div>
    </div>
  </div>

  <script>
    function renderTable(rows, cols) {
      if (!rows || !rows.length) return '<div class="empty">当前为空</div>';
      const head = `<tr>${cols.map(c => `<th>${c[1]}</th>`).join('')}</tr>`;
      const body = rows.map(r => `<tr>${cols.map(c => `<td>${r[c[0]] ?? ''}</td>`).join('')}</tr>`).join('');
      return `<table><thead>${head}</thead><tbody>${body}</tbody></table>`;
    }

    function render(data) {
      const metrics = [
        ['项目数', data.project_view?.length || 0],
        ['Agent Queue', data.agent_queue?.length || 0],
        ['Human Queue', data.human_queue?.length || 0],
        ['员工数', data.employee_view?.length || 0],
      ];

      document.getElementById('summary').innerHTML = metrics.map(([k, v]) =>
        `<div class="card"><div class="k">${k}</div><div class="v">${v}</div></div>`
      ).join('');

      document.getElementById('projectView').innerHTML = renderTable(data.project_view, [
        ['project_key', 'Project'],
        ['status', 'Status'],
        ['total_issues', 'Total'],
        ['closed_issues', 'Closed'],
        ['agent_queue_issues', 'Agent Queue'],
        ['human_queue_issues', 'Human Queue'],
      ]);

      document.getElementById('agentQueue').innerHTML = renderTable(data.agent_queue, [
        ['issue_no', 'Issue'],
        ['title', 'Title'],
        ['priority', 'Priority'],
        ['status', 'Status'],
        ['assigned_employee_id', 'Assigned Employee ID'],
        ['active_attempt_no', 'Attempt'],
      ]);

      document.getElementById('humanQueue').innerHTML = renderTable(data.human_queue, [
        ['issue_no', 'Issue'],
        ['title', 'Title'],
        ['status', 'Status'],
        ['blocker_summary', 'Blocker'],
        ['required_human_input', 'Required Input'],
      ]);

      document.getElementById('employeeView').innerHTML = renderTable(data.employee_view, [
        ['employee_key', 'Employee'],
        ['role', 'Role'],
        ['status', 'Status'],
        ['session_key', 'Session Key'],
      ]);
    }

    async function loadData() {
      const status = document.getElementById('status');
      status.textContent = '正在加载…';
      try {
        const res = await fetch(`./data.json?t=${Date.now()}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        render(data);
        status.innerHTML = '<span class="ok">已加载真实数据</span>';
      } catch (err) {
        status.innerHTML = `<span class="err">加载失败：${err.message}</span>`;
      }
    }

    document.getElementById('reloadBtn').addEventListener('click', loadData);
    loadData();
  </script>
</body>
</html>
